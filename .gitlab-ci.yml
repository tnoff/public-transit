include:
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/branch-cleanup.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/trufflehog-image.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/bump-version.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/release.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/buildkit-build-check.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: b93e5aa4a28e1f32ec2de5cb26d462135ce9afc6
    file: '/gitlab/tox-pipeline.yml'

default:
  tags:
    - self-hosted

# Canonical trigger-prefixed stages (CI consolidation, docs!59):
#   pr-check  pre-merge validation (build-check, image/secret scan)
#   test      tox matrix
#   push      default-branch tag/release publish
#   notify    Discord MR + failure notifications
#   renovate  scheduled dependency + branch maintenance
stages:
  - pr-check
  - test
  - push
  - notify
  - renovate

# Shared rules for the image-build + image-scan jobs. NOTE: this repo's
# Dockerfile uses `COPY . .`, so semantically every file change goes into
# the image layer. The positive list below is what actually affects runtime
# behaviour (python source under transit/ and trip_planner/, deps, version,
# Dockerfile itself). Doc-only or test-only changes get an image rebuild
# skipped — that's the optimization win on the OKE runner with concurrent=2,
# where these jobs otherwise burn slots needed by the tox matrix. Fork MRs
# keep the manual gate.
#
# Deliberately NOT run on the default branch: there, docker-push already
# rebuilds and pushes the image directly and in parallel, so a separate
# build-check is just a redundant second build, and a post-push image scan
# gates nothing (the image is already in the registry).
.image-build-rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - transit/**/*
        - trip_planner/**/*
        - pyproject.toml
        - VERSION

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
    BUMP_CHANGELOG: 'true'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

"pr-check:build":
  extends: .buildkit-build-check
  stage: pr-check
  rules: !reference [.image-build-rules, rules]

"test:tox-generate":
  extends: .tox-generate
  stage: test
  variables:
    # Pre-baked CI base image (ci-base-images:3.X) ships build-essential +
    # git + ffmpeg + postgresql. ${CI_BASE_IMAGE_PATH} is the group-level
    # plaintext var provisioned in terraform/infra/gitlab.tf and is expanded
    # here at parent-pipeline time. $$ escapes the second dollar so
    # ${PYTHON_VERSION} reaches tox-generate's heredoc literally; the child
    # pipeline's parallel: matrix: then substitutes it per Python minor at
    # runtime.
    TOX_BASE_IMAGE: '${CI_BASE_IMAGE_PATH}:$${PYTHON_VERSION}'
    TOX_GENERATE_IMAGE: '${CI_BASE_IMAGE_PATH}:3.14'

"test:tox":
  extends: .tox-pipeline
  stage: test

"pr-check:secrets":
  extends: .trufflehog
  stage: pr-check
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

"pr-check:scan":
  extends: .trufflehog-image
  stage: pr-check
  needs: ["pr-check:build"]
  variables:
    TRUFFLEHOG_IMAGE_TARBALL: image.tar
  rules: !reference [.image-build-rules, rules]


"push:tag":
  extends: .tag
  stage: push
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

"push:release":
  extends: .release
  stage: push
  needs:
    - job: "push:tag"
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

"notify:mr-opened":
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_OPENED_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

"notify:tag-failure":
  extends: .discord-notify
  stage: notify
  needs: ["push:tag"]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

"notify:release-failure":
  extends: .discord-notify
  stage: notify
  needs: ["push:release"]
  allow_failure: true
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Release job failed'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

"notify:renovate-failure":
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

"notify:merged":
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_MERGED_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Scheduled prune of stale automation branches (bump/* + renovate/*) left
# behind because remove_source_branch only fires on MR merge, not on the
# API-driven close of a superseded bump/renovate MR. Rides the weekly
# schedule and reuses RENOVATE_TOKEN. See the github-workflows
# .branch-cleanup template and docs runbooks/branch-cleanup.md.
branch-cleanup:
  extends: .branch-cleanup
  stage: renovate
  variables:
    CLEANUP_AGE_DAYS: "30"
    DRY_RUN: "false"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

"notify:cleanup-failure":
  extends: .discord-notify
  stage: renovate
  needs: [branch-cleanup]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Branch cleanup failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure
