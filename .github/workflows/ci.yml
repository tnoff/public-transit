name: Build Check

on:
  - pull_request

jobs:
  check-pins:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
  coverage:
    uses: tnoff/github-workflows/.github/workflows/coverage-check.yml@5c01c5cfcd5237914aee049f8b681b1a0b6215cc
    permissions:
      contents: read
      actions: read
    with:
      coverage_source: transit trip_planner
      install_command: pip install -r requirements.txt -r tests/requirements.txt
      python_version: 3.14
  build:
    name: Tox
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test with tox
      run: tox -v
